[tool:pytest]
pythonpath = .
norecursedirs = .git __pycache__
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')

[black]
line-length = 100

[coverage:run]
include = *
omit =
    wsgi.py
    */conftest.py
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    ...

[mypy]
warn_redundant_casts = True
warn_unused_ignores = True
disallow_subclassing_any = False
disallow_untyped_calls = False
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True
no_implicit_optional = True
strict_optional = True
ignore_missing_imports = True
namespace_packages = True
explicit_package_bases = True
exclude = alembic

[mypy-template.shared.tests.domain.assert_object_similar]
ignore_errors = True

[mypy-template.shared.tests.domain.assert_domain_event_similar]
ignore_errors = True

[mypy-template.shared.tests.domain.assert_aggregate_root_similar]
ignore_errors = True
